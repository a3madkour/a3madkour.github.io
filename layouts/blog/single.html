{{ define "main" }}
<article class="reading-column" data-pagefind-meta="section:{{ .Section }},date:{{ .Date.Format "2006-01-02" }}">
  {{ if .Params.image }}
    {{ with .Resources.Get .Params.image }}
      <p class="post-hero"><img src="{{ .RelPermalink }}" alt=""></p>
    {{ end }}
  {{ end }}
  <header>
    <h1>{{ .Title }}</h1>
    <p class="meta">{{ time.Format "January 02, 2006" .Date }}</p>
  </header>
  {{ .Content }}
</article>
{{ end }}
