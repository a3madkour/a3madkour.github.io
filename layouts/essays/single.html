{{ define "main" }}
<article class="reading-column essay">
  <header class="essay-header">
    {{ partial "essay-meta.html" . }}
    <h1>{{ .Title }}</h1>
    {{ with .Params.summary }}<p class="lede">{{ . }}</p>{{ end }}
  </header>
  <div class="essay-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
