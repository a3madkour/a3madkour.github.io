{{/* Server-rendered TOC. essay.js (existing nav.js) attaches the
     active-link highlighter via IntersectionObserver. */}}
{{ if .TableOfContents }}
<nav class="essay-toc" aria-label="Table of contents">
  <details open>
    <summary>Contents</summary>
    {{ .TableOfContents }}
  </details>
</nav>
{{ end }}
