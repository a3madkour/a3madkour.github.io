{{/* Server-rendered TOC (full tree). assets/js/nav.js progressively
     enhances it: active-link scrollspy highlight + collapsible
     subsections. Without JS the whole tree stays visible. */}}
{{ if .TableOfContents }}
<nav class="essay-toc" aria-label="Table of contents">
  <details open>
    <summary>Contents</summary>
    {{ .TableOfContents }}
  </details>
</nav>
{{ end }}
