<aside id="works-graph-panel" class="graph-panel" aria-hidden="true"
      role="region" aria-label="Works constellation" inert>
  <header class="graph-panel-header">
    <span class="graph-panel-title">Constellation</span>
    <button type="button" class="graph-panel-close" aria-controls="works-graph-panel" aria-label="Close graph panel">×</button>
  </header>
  {{/* Toolbar JS-built + panel canvas as <div> + JS-created resize handle —
       parity with garden/research (graph-core owns all three). */}}
  <div class="graph-toolbar graph-toolbar--panel"></div>
  <div class="graph-panel-canvas"></div>
  {{ partial "graph-legend.html" (dict "section" "works" "variant" "panel") }}
</aside>
