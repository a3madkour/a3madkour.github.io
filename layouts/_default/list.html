{{ define "main" }}
<section class="reading-column" data-pagefind-meta="section:{{ .Section }}">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <ul class="page-list">
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
        {{ with .Description }}<span class="page-list-desc"> — {{ . }}</span>{{ end }}
      </li>
    {{ end }}
  </ul>
</section>
{{ end }}
