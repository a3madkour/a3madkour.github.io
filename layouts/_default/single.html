{{ define "main" }}
<article class="reading-column">
  <span data-pagefind-meta="section:{{ .Section }}" hidden></span>
  <span data-pagefind-meta="date:{{ .Date.Format "2006-01-02" }}" hidden></span>
  <span data-pagefind-filter="section:{{ .Section }}" hidden></span>
  <h1>{{ .Title }}</h1>
  {{- .Content -}}
</article>
{{ end }}
