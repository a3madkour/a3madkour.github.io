# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    # LHCI (desktop + mobile, ~15 min each at numberOfRuns:3) now runs in the
    # parallel lhci-* jobs, not here — this job is linters + hugo + pagefind +
    # E2E (~5 min). See the lhci-desktop/lhci-mobile jobs below.
    timeout-minutes: 15
    env:
      HUGO_VERSION: 0.162.1
      PAGEFIND_VERSION: 1.5.2
      # Published SHA256 of hugo_extended_${HUGO_VERSION}_linux-amd64.deb
      # (from hugo_${HUGO_VERSION}_checksums.txt). Update on version bump.
      HUGO_DEB_SHA256: 9678d806aa1382742e7d61a4e96b174560ff81f82ad6e75c1d69b40d85fe4210
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          echo "${HUGO_DEB_SHA256}  ${{ runner.temp }}/hugo.deb" | sha256sum -c -
          sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Verify CSS contrast (WCAG)
        run: python3 tools/check-contrast.py
      - name: Verify dark-mode token blocks in sync
        run: python3 tools/check_dark_tokens.py
      - name: Run dark-token linter unit tests
        run: python3 -m unittest tools/test_check_dark_tokens.py -v
      - name: Verify CSS class referential integrity
        run: python3 tools/check_css_refs.py
      - name: Run CSS-refs linter unit tests
        run: python3 -m unittest tools/test_check_css_refs.py -v
      - name: Verify CSS spacing tokens
        run: python3 tools/check_spacing_tokens.py
      - name: Run spacing-token linter unit tests
        run: python3 -m unittest tools/test_check_spacing_tokens.py -v
      - name: Verify essay fixtures
        run: python3 tools/check_fixtures.py
      - name: Run essay linter unit tests
        run: python3 -m unittest tools/test_check_fixtures.py -v
      - name: Verify essay TOC depth
        run: python3 tools/check_toc_depth.py
      - name: Run essay TOC depth linter unit tests
        run: python3 -m unittest tools/test_check_toc_depth.py -v
      - name: Verify garden fixtures
        run: python3 tools/check_garden_fixtures.py
      - name: Run garden linter unit tests
        run: python3 -m unittest tools/test_check_garden_fixtures.py -v
      - name: Verify garden links
        run: python3 tools/check_garden_links.py
      - name: Run garden links linter unit tests
        run: python3 -m unittest tools/test_check_garden_links.py -v
      - name: Verify filter-chips config
        run: python3 tools/check_filter_chips_config.py
      - name: Run filter-chips linter unit tests
        run: python3 -m unittest tools/test_check_filter_chips_config.py -v
      - name: Verify research fixtures
        run: python3 tools/check_research_fixtures.py
      - name: Run research fixture linter unit tests
        run: python3 -m unittest tools/test_check_research_fixtures.py -v
      - name: Verify research links
        run: python3 tools/check_research_links.py
      - name: Run research links linter unit tests
        run: python3 -m unittest tools/test_check_research_links.py -v
      - name: Verify citations
        run: python3 tools/check_citations.py
      - name: Run citation linter unit tests
        run: python3 -m unittest tools/test_check_citations.py -v
      - name: Verify math frontmatter coupling
        run: python3 tools/check_math.py
      - name: Run math linter unit tests
        run: python3 -m unittest tools/test_check_math.py -v
      - name: Verify works fixtures
        run: python3 tools/check_works_fixtures.py
      - name: Run works fixture linter unit tests
        run: python3 -m unittest tools/test_check_works_fixtures.py -v
      - name: Verify works links
        run: python3 tools/check_works_links.py
      - name: Run works links linter unit tests
        run: python3 -m unittest tools/test_check_works_links.py -v
      - name: Verify synced-poetry markers
        run: python3 tools/check_poetry_synced.py
      - name: Run synced-poetry linter unit tests
        run: python3 -m unittest tools/test_check_poetry_synced.py -v
      - name: Verify library fixtures
        run: python3 tools/check_library_fixtures.py
      - name: Run library fixture linter unit tests
        run: python3 -m unittest tools/test_check_library_fixtures.py -v
      - name: Verify library links
        run: python3 tools/check_library_links.py
      - name: Run library links linter unit tests
        run: python3 -m unittest tools/test_check_library_links.py -v
      - name: Verify library cover schema + cache + audit
        run: python3 tools/check_library_covers.py
      - name: Run library cover linter unit tests
        run: python3 -m unittest tools/test_check_library_covers.py -v
      - name: Lint — icon attribution
        run: python3 tools/check_icon_attribution.py
      - name: Test — icon-attribution linter
        run: python3 -m unittest tools/test_check_icon_attribution.py -v
      - name: Lint — library shelves
        run: python3 tools/check_library_shelves.py
      - name: Test — library-shelves linter
        run: python3 -m unittest tools/test_check_library_shelves.py -v
      - name: Verify RSS XSL
        run: python3 tools/check_rss_xsl.py
      - name: Run RSS XSL linter unit tests
        run: python3 -m unittest tools/test_check_rss_xsl.py -v
      - name: Verify garden history
        run: python3 tools/check_garden_history.py
      - name: Run garden history linter unit tests
        run: python3 -m unittest tools/test_check_garden_history.py -v
      - name: Verify streams fixtures
        run: python3 tools/check_streams_fixtures.py
      - name: Run streams fixture linter unit tests
        run: python3 -m unittest tools/test_check_streams_fixtures.py -v
      - name: Verify streams links
        run: python3 tools/check_streams_links.py
      - name: Run streams links linter unit tests
        run: python3 -m unittest tools/test_check_streams_links.py -v
      - name: Verify org-asset references
        run: python3 tools/check_org_assets.py
      - name: Run org-assets linter unit tests
        run: python3 -m unittest tools/test_check_org_assets.py -v
      - name: Verify graph-chrome consistency
        run: python3 tools/check_graph_chrome.py
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/Los_Angeles
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Run pagefind metadata linter unit tests
        run: cd tools && python3 -m unittest test_check_pagefind_meta.py -v
      - name: Verify pagefind metadata on built pages
        run: python3 tools/check_pagefind_meta.py
      - name: Run cite metadata linter unit tests
        run: cd tools && python3 -m unittest test_check_cite_meta.py -v
      - name: Verify cite metadata on built pages
        run: python3 tools/check_cite_meta.py
      - name: Install Pagefind
        env:
          # SHA256 of pagefind-v${PAGEFIND_VERSION}-x86_64-unknown-linux-musl.tar.gz.
          # Update on version bump.
          PAGEFIND_SHA256: afb824a9e7f64905a934900481cea5be679c03975e527329e0e5e6cc70f5feda
        run: |
          wget -O ${{ runner.temp }}/pagefind.tar.gz \
            https://github.com/CloudCannon/pagefind/releases/download/v${PAGEFIND_VERSION}/pagefind-v${PAGEFIND_VERSION}-x86_64-unknown-linux-musl.tar.gz
          echo "${PAGEFIND_SHA256}  ${{ runner.temp }}/pagefind.tar.gz" | sha256sum -c -
          tar -xzf ${{ runner.temp }}/pagefind.tar.gz -C ${{ runner.temp }}
          sudo mv ${{ runner.temp }}/pagefind /usr/local/bin/
          pagefind --version
      - name: Build Pagefind index
        run: pagefind --site public/
      - name: Set up Node (E2E harness)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Install E2E dependencies
        run: npm ci
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E over built site
        run: npx playwright test
      - name: Verify build smoke test
        run: python3 tools/check_smoke.py
      - name: Verify anchor-link affordance present
        run: python3 tools/check_anchor_link.py
      - name: Run anchor-link linter unit tests
        run: python3 -m unittest tools/test_check_anchor_link.py -v
      - name: Verify explorables coupling
        run: python3 tools/check_explorables.py
      - name: Run explorables linter unit tests
        run: python3 -m unittest tools/test_check_explorables.py -v
      - name: Regenerate LHCI URLs from sitemap manifest
        run: python3 tools/gen_lhci_urls.py
      - name: Run gen_lhci_urls unit tests
        run: python3 -m unittest tools/test_gen_lhci_urls.py -v
      - name: Verify LHCI URLs resolve to built pages
        run: python3 tools/check_lhci_urls.py
      - name: Run LHCI URL linter unit tests
        run: cd tools && python3 -m unittest test_check_lhci_urls.py -v
      - name: Verify page weights against §8 budgets
        run: python3 tools/check_page_weights.py
      - name: Run page-weight linter unit tests
        run: cd tools && python3 -m unittest test_check_page_weights.py -v
      - name: Upload built site for Lighthouse jobs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: built-site
          path: ./public
          retention-days: 1
          include-hidden-files: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./public

  # Lighthouse CI — desktop. Split into its own job (parallel with lhci-mobile)
  # so the ~15-min desktop + ~15-min mobile runs no longer serialize inside
  # `build` (that blew the deploy timeout on 2026-07-04). Consumes the built
  # site via the `built-site` artifact; re-runs gen_lhci_urls so its URL list
  # matches what `build` validated. Gates deploy.
  lhci-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Download built site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: built-site
          path: public
      - name: Regenerate LHCI URLs from sitemap manifest
        run: python3 tools/gen_lhci_urls.py
      - name: Lighthouse CI (desktop)
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse-results-desktop

  # Lighthouse CI — mobile (parallel with lhci-desktop; same built-site artifact).
  lhci-mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Download built site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: built-site
          path: public
      - name: Regenerate LHCI URLs from sitemap manifest
        run: python3 tools/gen_lhci_urls.py
      - name: Lighthouse CI (mobile)
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: lighthouserc.mobile.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse-results-mobile

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, lhci-desktop, lhci-mobile]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
