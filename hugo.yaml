baseURL: https://a3madkour.github.io
languages:
  en:
    label: English
    locale: en-US
title: Content for the Context gods
module:
  hugoVersion:
    # Real floor is 0.162.1 (0.162 tightened security.allowContent; CI pins
    # HUGO_VERSION=0.162.1). Keep this in step with the CI pin.
    extended: true
    min: "0.162.0"

taxonomies:
  tag: tags
  series: series

# Only the essays section ships an RSS feed; home/sections/taxonomies
# default to HTML-only. Essays opt back into RSS via its frontmatter
# (content/essays/_index.md).
outputs:
  home: [HTML, LHCI-PAGES]
  section: [HTML]
  taxonomy: [HTML]
  term: [HTML]

# Tier 7.1: LHCI URL manifest. Generates public/lhci-pages.json with
# {url, kind, section, type} per page. Consumed by tools/gen_lhci_urls.py
# to regenerate lighthouserc.{json,mobile.json} in CI.
outputFormats:
  LHCI-PAGES:
    mediaType: application/json
    baseName: lhci-pages
    isPlainText: true
    notAlternative: true

markup:
    goldmark:
        renderer:
            # B.1.1: ox-hugo emits `@@html:<a>...</a>@@` snippets for rewritten
            # org-roam links; without unsafe:true Goldmark strips the anchors
            # and shows `<!-- raw HTML omitted -->` in their place.  All site
            # content is author-controlled (no user submissions), so unsafe is fine.
            unsafe: true
    highlight:
        style: dracula
    tableOfContents:
        startLevel: 2
        endLevel: 6
        ordered: false

params:
  author:
    name: "Madkour, Abdelrahman"
    given: "Abdelrahman"
    family: "Madkour"
